# Add inside your nginx server block for clickmastersdigitalmarketing.com
# Redirects www to non-www (fixes duplicate content for Google indexing)

server {
    listen 80;
    listen 443 ssl;
    server_name www.clickmastersdigitalmarketing.com;
    return 301 https://clickmastersdigitalmarketing.com$request_uri;
}

